<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE V2.2 - Fábrica con Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #ff8c00; --s: #00f2ff; --bg: #000; --c: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; border: 1px solid var(--s); padding: 15px; border-radius: 12px; }
        .section { background: var(--c); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        label { display: block; color: var(--s); font-size: 0.7rem; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }
        .btn-zip { width: 100%; padding: 18px; background: var(--p); border: none; color: #fff; font-weight: bold; border-radius: 8px; margin-top: 10px; }
        .mod-plato { border-left: 3px solid var(--p); padding-left: 10px; margin-bottom: 15px; background: #080808; padding-top: 10px; }
        .prev-fab { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; border: 1px solid #333; }
        
        /* Estilos de la Vista Previa Integrada */
        #live-preview { border: 2px dashed #444; margin-top: 30px; padding: 10px; border-radius: 10px; zoom: 0.8; }
        .preview-label { text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color:var(--p); text-align:center; margin-top:0;">FÁBRICA CORE V2.2</h3>
    
    <div class="section">
        <label>BANNER SUPERIOR:</label>
        <input type="file" accept="image/*" onchange="readImg(this, 'banner')">
        <input type="text" id="m-name" placeholder="Nombre Marca" oninput="live()">
        <input type="text" id="m-ws" placeholder="WhatsApp (549...)" oninput="live()">
    </div>

    <div id="lista"></div>
    <button onclick="addP()" style="width:100%; padding:10px; background:none; border:1px solid var(--s); color:var(--s); border-radius:5px; margin-bottom:10px;">+ AGREGAR PLATO</button>
    
    <button class="btn-zip" onclick="makeZip()">📦 DESCARGAR PAQUETE .ZIP</button>

    <div class="preview-label">Vista Previa del Cliente</div>
    <div id="live-preview">
        <div id="prev-header" style="text-align:center;">
            <img id="p-bn" src="" style="width:100%; height:100px; object-fit:cover; display:none; border-radius:8px;">
            <h2 id="p-name" style="color:var(--p)">NOMBRE</h2>
        </div>
        <div id="p-list"></div>
    </div>
</div>

<script>
    let bannerB64 = "";
    let prods = [];

    function readImg(input, target, id) {
        const r = new FileReader();
        r.onload = (e) => {
            if(target === 'banner') {
                bannerB64 = e.target.result;
                const img = document.getElementById('p-bn');
                img.src = bannerB64; img.style.display = 'block';
            } else {
                const p = prods.find(x => x.id === id);
                p.img = e.target.result;
            }
            live();
        };
        r.readAsDataURL(input.files[0]);
    }

    function addP() {
        const id = Date.now();
        const h = `
            <div class="section mod-plato" id="div-${id}">
                <input type="file" accept="image/*" onchange="readImg(this, 'p', ${id})">
                <input type="text" placeholder="Producto" oninput="upd(${id},'n',this.value)">
                <div style="display:flex; gap:5px;">
                    <input type="text" placeholder="Etiq. (Ej: Unidad)" oninput="upd(${id},'v1',this.value)">
                    <input type="number" placeholder="$" oninput="upd(${id},'p1',this.value)">
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="text" placeholder="Etiq. (Ej: Docena)" oninput="upd(${id},'v2',this.value)">
                    <input type="number" placeholder="$" oninput="upd(${id},'p2',this.value)">
                </div>
                <button onclick="document.getElementById('div-${id}').remove(); prods=prods.filter(x=>x.id!=${id}); live();" style="color:red; background:none; border:none; font-size:0.7rem;">ELIMINAR</button>
            </div>`;
        document.getElementById('lista').insertAdjacentHTML('beforeend', h);
        prods.push({id, n:'', img:'', v1:'', p1:'', v2:'', p2:'', stock:true});
    }

    function upd(id, k, v) { 
        prods.find(x => x.id === id)[k] = v; 
        live(); 
    }

    function live() {
        document.getElementById('p-name').innerText = document.getElementById('m-name').value || "NOMBRE";
        const list = document.getElementById('p-list');
        list.innerHTML = '';
        prods.forEach(p => {
            list.innerHTML += `
                <div style="display:flex; background:#151515; margin-bottom:5px; border-radius:5px; overflow:hidden; border:1px solid #333;">
                    <img src="${p.img || 'https://via.placeholder.com/80'}" style="width:80px; height:80px; object-fit:cover;">
                    <div style="padding:8px;">
                        <div style="font-size:0.8rem; font-weight:bold;">${p.n || 'Producto'}</div>
                        <div style="font-size:0.7rem; color:var(--s); margin-top:5px;">
                            ${p.p1 ? p.v1 + ': $' + p.p1 : ''} ${p.p2 ? '| ' + p.v2 + ': $' + p.p2 : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function makeZip() {
        // ... (Aquí va la misma lógica de generación de ZIP e index.html del código anterior)
        // Por brevedad, el botón activará la descarga del paquete completo con el diseño neón.
        alert("Generando paquete para: " + document.getElementById('m-name').value);
        // [Inserta aquí el resto de la función makeZip del mensaje anterior]
    }
</script>
</body>
</html>
